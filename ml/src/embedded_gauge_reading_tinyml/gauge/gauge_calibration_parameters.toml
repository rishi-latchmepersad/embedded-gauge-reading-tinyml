[gauge_1]
gauge_id = 1
general_description = "white gauge made by littlegood with temperature and humidity needle"
gauge_parameter = "temperature"
# Firmware board_celsius_v1 endpoints expressed north-zero: -47.06° -> -30°C and +67.93° -> +50°C.
# These absorb the former +9.72° angle offset and 1.0769231 temperature gain.
min_deg = -47.06
sweep_deg = 114.99
min_value = -30.0 # actual min value in degC
max_value = 50.0  # actual max value in degC
units = "degree celcius" # outer numbers are farenheit, but we want celcius from the inner numbers
direction = "clockwise"
reference = "north"
gauge_background_colour = "white"
needle_colour = "black"
[gauge_2]
gauge_id = 2
general_description = "white and silver pressure gauge made in spain"
gauge_parameter = "pressure"
min_deg = 135.0   # Min tick at ~ 7:30
sweep_deg = 270.0 # Needle sweeps to ~ 4:30 (270 degree total sweep)
min_value = 0 # actual min value in psi
max_value = 400.0  # actual max value in psi
units = "psi" # outer numbers are psi, inner numbers are bar
direction = "clockwise"
gauge_background_colour = "white"
needle_colour = "black"
